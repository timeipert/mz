<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Notationsdokumentation - Patterns</h4>
  <button class="btn btn-outline-primary btn-sm" (click)="analyze()"><i class="bi bi-arrow-repeat"></i> Refresh</button>
</div>

<div class="table-responsive">
  <table class="table table-hover align-middle">
    <thead class="table-light">
      <tr>
        <th scope="col" style="width: 25%">Pattern</th>
        <th scope="col" style="width: 8%">Count</th>
        <th scope="col" style="width: 18%" title="Enter a number or ID to set the sort order — applied on blur">
          Order / Ref ID <i class="bi bi-sort-numeric-down text-muted ms-1" style="font-size:0.8em;"></i>
        </th>
        <th scope="col">Occurrences</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="patternGroups.length === 0">
        <td colspan="4" class="text-center py-4 text-muted">No patterns extracted yet. Add some neumes to your document!</td>
      </tr>
      <tr *ngFor="let group of patternGroups">
        <td>
          <div class="d-flex align-items-center gap-2">
            <app-svg-pattern [pattern]="group.patternId"></app-svg-pattern>
            <span class="font-monospace text-muted" style="font-size:0.75rem;">{{group.patternId}}</span>
          </div>
        </td>
        <td>
          <span class="badge bg-secondary rounded-pill">{{group.count}}</span>
        </td>
        <td>
          <input type="text" class="form-control form-control-sm"
                 [ngModel]="group.refId"
                 (blur)="updateRefId(group, $any($event.target).value)"
                 placeholder="e.g. n_123">
        </td>
        <td>
          <div class="d-flex flex-wrap gap-1">
            <span *ngFor="let loc of group.locationGroups"
                  class="occ-badge"
                  [title]="'View in gallery — ' + loc.sample.syllable"
                  (click)="openOccurrenceInGallery(loc.sample)">
              <i class="bi bi-image occ-icon"></i>
              <span class="occ-loc">{{loc.label}}</span><span class="occ-count" *ngIf="loc.count > 1">&thinsp;×{{loc.count}}</span>
            </span>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
