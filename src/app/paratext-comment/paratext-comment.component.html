<div class="modal-header paratext">
  <h4 class="modal-title" id="modal-basic-title">Paratext Comments</h4>
  <button type="button" class="close" aria-label="Close" (click)="activeModal.close('Cross click')">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-body paratext">
  <label>Comment</label>
  <textarea [(ngModel)]="comment.comment" name="commentText"></textarea>
  <label>Alternative Text</label>
  <textarea [(ngModel)]="comment.alternativeText" name="alternativeText"></textarea>
  <label for="emendation-check">Emendation</label>
  <input type="checkbox" [(ngModel)]="comment.emendation" id="emendation-check" name="emendation-check">

  <button *ngIf="!comment.tree" type="button" class="btn btn-outline-secondary" (click)="addTree(comment)">
    Add Comment Tree
  </button>

  <div *ngIf="comment.tree">
    <app-comment-tree [tree]="comment.tree" (treeEvent)="handleCommentTreeEvent($event)"
      [originalCreator]="originalCreator" />
  </div>

  <button type="button" class="btn btn-primary" (click)="onSave()">Apply</button>
</div>
