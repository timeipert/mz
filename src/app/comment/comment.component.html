<div class="modal-header">
  <h4 class="modal-title fw-bold mb-0">
    <i class="bi bi-chat-square-text"></i>
    Edit Comment
    <span class="header-sub" *ngIf="activeComments().length > 0">
      ({{activeComments().length}} {{activeComments().length === 1 ? 'entry' : 'entries'}})
    </span>
  </h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss()"></button>
</div>
<div class="modal-body">
  <app-comment-info />

  <div *ngFor="let comment of activeComments(); index as i" class="note-comment">

    <!-- Header row: index pill + delete -->
    <div class="card-header-row">
      <span class="index-pill">
        <i class="bi bi-chat-left-quote"></i>
        Comment {{i + 1}}
      </span>
      <button type="button" class="delete-btn" (click)="deleteComment(comment)" title="Delete this comment">
        <i class="bi bi-trash3 me-1"></i>Delete
      </button>
    </div>

    <!-- Content type switcher -->
    <label class="mb-1">Content Type</label>
    <ul class="nav nav-pills type-switcher">
      <li class="nav-item">
        <a class="nav-link" [class.active]="comment.commentType === 'text'" (click)="setCommentType(comment, 'text')">
          <i class="bi bi-text-paragraph me-1"></i>Text
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" [class.active]="comment.commentType === 'lines'" (click)="setCommentType(comment, 'lines')">
          <i class="bi bi-music-note-list me-1"></i>Staff Line
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" [class.active]="comment.commentType === 'tree'" (click)="setCommentType(comment, 'tree')">
          <i class="bi bi-grid-3x3-gap me-1"></i>Grid
        </a>
      </li>
    </ul>

    <!-- Text editor with undo/redo -->
    <div *ngIf="comment.commentType === 'text'" class="position-relative">
      <label>Comment Text</label>
      <div class="undo-redo-bar">
        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" (click)="undoText(comment)"
                [disabled]="!canUndo(comment)" title="Undo">
          <i class="bi bi-arrow-counterclockwise me-1"></i>Undo
        </button>
        <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" (click)="redoText(comment)"
                [disabled]="!canRedo(comment)" title="Redo">
          Redo<i class="bi bi-arrow-clockwise ms-1"></i>
        </button>
      </div>
      <textarea class="form-control p-3" rows="6"
                [ngModel]="comment.text"
                (ngModelChange)="onTextChange(comment, $event)"
                placeholder="Enter your comment here…"
                style="resize: vertical;"></textarea>
    </div>

    <!-- Emendation flag (always visible) -->
    <div class="emendation-row form-check form-switch p-0">
      <input class="form-check-input" type="checkbox"
             [ngModel]="comment.emendation"
             (ngModelChange)="onEmendationChange(comment, $event)"
             [id]="'emendation-' + i" />
      <label [for]="'emendation-' + i">
        Mark as Emendation
        <div class="emendation-hint">Editorial correction of the source — shown with a distinct symbol in the published edition.</div>
      </label>
    </div>

    <!-- Staff line (lemma + reading) -->
    <div *ngIf="comment.commentType === 'lines' && comment.lines" class="panel">
      <div class="panel-label">Lemma</div>
      <div class="original mb-3 bg-white border rounded p-2">
        <app-zeile-section [documentType]="'Gesang'" [readOnly]="false" [data]="getOriginal(i)" [comments]="[]"
          [zipper]="[0]"></app-zeile-section>
        <div class="hider"></div>
      </div>
      <div class="panel-label">Reading</div>
      <div *ngFor="let line of comment.lines; index as j" class="line-comment">
        <app-zeile-section #sub [documentType]="documentType" [readOnly]="false" (onEvent)="handleEvent($event, i, j)"
          *ngIf="line.kind === 'ZeileContainer'" [data]="line" [comments]="[]" [zipper]="[0]"></app-zeile-section>
        <app-paratext-section #sub [documentType]="documentType" [readOnly]="false"
          (onEvent)="handleEvent($event, i, j)" *ngIf="line.kind === 'ParatextContainer'" [data]="line" [comments]="[]"
          [zipper]="[0]"></app-paratext-section>
      </div>
    </div>

    <!-- Tree / grid -->
    <div *ngIf="comment.commentType === 'tree'" class="panel">
      <app-comment-tree *ngIf="comment.tree" [tree]="comment.tree" (treeEvent)="handleCommentTreeEvent($event, comment)"
        [originalCreator]="originalCreator(comment)" />
    </div>
  </div>

  <div *ngIf="activeComments().length === 0" class="empty-state">
    <i class="bi bi-chat-square-dots"></i>
    <h5>No comments to edit</h5>
    <p class="small mb-0">All comments on this span have been deleted.</p>
  </div>
</div>
